<header class="app-header chat-room-header">
  <div class="chat-room-header-left">
    <button type="button" id="chat-mobile-back-btn" class="chat-back-btn" title="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="chat-room-user-info">
      <div class="chat-room-avatar" id="chat-room-avatar">A</div>
      <div>
        <div class="chat-room-name" id="chat-header-title">Alex Chen</div>
        <div class="chat-room-status">
          <span class="chat-status-dot online"></span>
          <span class="chat-status-text" id="chat-status-text">Online now</span>
        </div>
      </div>
    </div>
  </div>
  <div class="chat-room-actions">
    <button class="chat-action-icon-btn" title="Voice Call">📞</button>
    <button class="chat-action-icon-btn" title="Video Call">📹</button>
  </div>
</header>

<div class="exchange-started-banner">
  <span class="exchange-banner-icon">🔗</span> Exchange Started — React.js ↔ UI/UX Design
</div>

<!-- Messages log -->
<div class="chat-messages-container" id="chat-messages-log" data-lenis-prevent="true">
  <!-- Message bubbles are injected by state/router modules -->
</div>

<!-- Input bar -->
<div class="chat-input-bar">
  <button class="chat-emoji-btn" title="Emoji">😊</button>
  <input type="text" class="chat-text-input" id="chat-message-input" placeholder="Type a message...">
  <button type="button" id="chat-send-btn" class="chat-send-btn" title="Send">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>
