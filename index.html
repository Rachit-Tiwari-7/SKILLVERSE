<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skillverse - Student Skill Exchange</title>
</head>
<body>

  <!-- Global Header Bar -->
  <header class="site-header">
    <div class="logo-zone" id="logo-home-trigger">
      <div class="logo-shapes">
        <div class="logo-circle"></div>
        <div class="logo-square"></div>
      </div>
      <h1 class="logo-title">SKILLVERSE</h1>
    </div>
    
    <nav class="desktop-nav">
      <button class="desktop-nav-link" data-nav="home" id="nav-link-home">Home</button>
      <button class="desktop-nav-link" data-nav="matches" id="nav-link-matches">Matches</button>
      <button class="desktop-nav-link" data-nav="messages" id="nav-link-messages">Chats</button>
      <button class="desktop-nav-link" data-nav="profile" id="nav-link-profile">Me</button>
    </nav>
    
    <div class="header-controls">
      <button class="neobrutal-btn yellow" id="resetStateBtn">
        ↺ RESET STATE
      </button>
      <button class="neobrutal-btn black" id="themeToggleBtn">
        ☾ DARK MODE
      </button>
    </div>
  </header>

  <!-- Responsive Layout Main Content Container -->
  <main class="main-content" id="main-content">
    <!-- Active screen components will be dynamically loaded here by main.js -->
  </main>

  <!-- Mobile Bottom Tab Navigation -->
  <nav class="app-nav-bar mobile-only-nav">
    <div class="app-nav-item" data-nav="home" id="mobile-nav-home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      <span>Home</span>
    </div>
    <div class="app-nav-item" data-nav="matches" id="mobile-nav-matches">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
      <span>Match</span>
    </div>
    <div class="app-nav-item" data-nav="messages" id="mobile-nav-messages">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <span>Chat</span>
    </div>
    <div class="app-nav-item" data-nav="profile" id="mobile-nav-profile">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span>Me</span>
    </div>
  </nav>

  <!-- AI Chatbot Widget -->
  <div class="ai-chatbot-widget" id="ai-chatbot-widget">
    <!-- Chat Window (handled via classes) -->
    <div class="ai-chat-window" id="ai-chat-window">
      <div class="ai-chat-header">
        <div class="ai-chat-title">
          <span class="ai-icon">🤖</span>
          <span>Skillverse AI</span>
        </div>
        <button class="ai-chat-close-btn" id="ai-chat-close-btn">✖</button>
      </div>
      <div class="ai-chat-messages" id="ai-chat-messages" data-lenis-prevent="true">
        <div class="ai-msg ai-msg-bot">
          <div class="ai-bubble">Hello! I'm the Skillverse AI. How can I help you find matches or navigate the platform today?</div>
        </div>
      </div>
      <!-- Suggestion Chips -->
      <div class="ai-suggestion-chips" id="ai-suggestion-chips">
        <button class="ai-chip" data-query="How do I find matches?">🔍 Match Info</button>
        <button class="ai-chip" data-query="How does the waiting room work?">⏳ Call Lobby</button>
        <button class="ai-chip" data-query="How do I get XP?">⚡ Earn XP</button>
      </div>
      <div class="ai-chat-input-area">
        <input type="text" id="ai-chat-input" placeholder="Ask something...">
        <button id="ai-chat-send-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
    
    <!-- Floating Button -->
    <button class="ai-fab-btn" id="ai-fab-btn" title="Ask AI">
      <span class="ai-fab-icon">✨</span>
    </button>
  </div>

  <!-- Load Main script -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
